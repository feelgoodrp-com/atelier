# Tag-driven release: publishes the self-contained sidecar, builds the Tauri
# app and uploads the Windows installers (NSIS + MSI) to a GitHub release.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The tag must match the version in src-tauri/tauri.conf.json.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace "^v", ""
          $conf = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $conf) { throw "Tag v$tag does not match tauri.conf.json version $conf" }

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish sidecar (self-contained single file)
        shell: pwsh
        run: ./sidecar/publish.ps1

      - name: Build app + installers
        run: bun run tauri build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: atelier ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
