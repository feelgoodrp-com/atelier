# Release pipeline for the atelier desktop app.
#
# Two ways to cut a release:
#   1. Actions -> "Release" -> "Run workflow" -> pick patch / minor / major.
#      Bumps the version everywhere (package.json, src-tauri/tauri.conf.json,
#      src-tauri/Cargo.toml + Cargo.lock), commits "chore: release vX.Y.Z" to
#      master, tags it, then builds.
#   2. Push a tag yourself (git tag vX.Y.Z && git push origin vX.Y.Z) — builds
#      that exact tag without bumping (the tag must match tauri.conf.json).
#
# Output attached to the GitHub Release: NSIS installer (*-setup.exe), MSI, and
# a portable ZIP (app exe + sidecar, no install needed).
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Versionssprung"
        type: choice
        options: [patch, minor, major]
        default: patch
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --- Manual run: bump the version, commit + tag, push ---
      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $cur = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $p = $cur.Split('.')
          $maj = [int]$p[0]; $min = [int]$p[1]; $pat = [int]$p[2]
          switch ("${{ inputs.bump }}") {
            'major' { $maj++; $min = 0; $pat = 0 }
            'minor' { $min++; $pat = 0 }
            default { $pat++ }
          }
          $new = "$maj.$min.$pat"
          $pVer  = '"version":\s*"[^"]*"'
          $cToml = '(?m)^version = "[^"]*"'
          $cLock = '(?ms)(name = "atelier"\r?\nversion = ")[^"]*(")'
          function Repl($file, $pattern, $replacement) {
            $c = Get-Content $file -Raw
            $c = [regex]::Replace($c, $pattern, $replacement, 1)
            [System.IO.File]::WriteAllText((Resolve-Path $file), $c, (New-Object System.Text.UTF8Encoding($false)))
          }
          Repl 'package.json'              $pVer  ('"version": "' + $new + '"')
          Repl 'src-tauri/tauri.conf.json' $pVer  ('"version": "' + $new + '"')
          Repl 'src-tauri/Cargo.toml'      $cToml ('version = "' + $new + '"')
          Repl 'src-tauri/Cargo.lock'      $cLock ('${1}' + $new + '${2}')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release v$new"
          git tag "v$new"
          git push origin HEAD:master
          git push origin "v$new"
          "VERSION=$new" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # --- Tag run: take the version from the tag (must match the config) ---
      - name: Resolve tag version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          $conf = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($v -ne $conf) { throw "Tag v$v does not match tauri.conf.json version $conf" }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish sidecar (self-contained single file)
        shell: pwsh
        run: ./sidecar/publish.ps1

      - name: Build app + installers
        run: bun run tauri build
        env:
          # Signs the NSIS/MSI bundles and emits the `.sig` files the updater
          # verifies against the public key in tauri.conf.json. Both secrets are
          # REQUIRED now that bundle.createUpdaterArtifacts is on — without them
          # the build fails. Generate locally with `tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # --- Portable build: app exe + sidecar in one ZIP, no installer ---
      - name: Assemble portable ZIP
        shell: pwsh
        run: |
          $rel = "src-tauri/target/release"
          $out = "dist-portable/atelier by feelgood"
          New-Item -ItemType Directory -Force $out | Out-Null
          $main = @("$rel/atelier by feelgood.exe", "$rel/atelier.exe") |
            Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $main) { throw "main exe not found under $rel" }
          Copy-Item $main "$out/atelier by feelgood.exe"
          Copy-Item "src-tauri/binaries/fg-atelier-sidecar-x86_64-pc-windows-msvc.exe" "$out/fg-atelier-sidecar.exe"
          if (Test-Path "$rel/WebView2Loader.dll") { Copy-Item "$rel/WebView2Loader.dll" $out }
          $readme = @(
            "atelier by feelgood (portable) v$env:VERSION",
            "",
            "Starte 'atelier by feelgood.exe'. Die Datei fg-atelier-sidecar.exe muss",
            "im selben Ordner liegen.",
            "Benoetigt die Microsoft Edge WebView2 Runtime (auf Windows 10/11 i.d.R.",
            "bereits vorhanden)."
          ) -join "`r`n"
          Set-Content -Path "$out/LIESMICH.txt" -Value $readme -Encoding utf8
          Compress-Archive -Path $out -DestinationPath "atelier-$env:VERSION-portable.zip" -Force

      # --- Updater manifest: rename the signed NSIS installer to a stable,
      # space-free asset name (GitHub rewrites spaces in upload names, which
      # would break the download URL) and emit the latest.json the in-app
      # updater polls. The signature is the verbatim content of the .sig file. ---
      - name: Build updater manifest (latest.json)
        shell: pwsh
        run: |
          $nsis = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$nsis/*-setup.exe" | Select-Object -First 1
          $sig = Get-ChildItem "$nsis/*-setup.exe.sig" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found under $nsis" }
          if (-not $sig) { throw "NSIS .sig not found — is TAURI_SIGNING_PRIVATE_KEY set?" }
          $asset = "atelier_$($env:VERSION)_x64-setup.exe"
          Move-Item $exe.FullName "$nsis/$asset" -Force
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $url = "https://github.com/feelgoodrp-com/atelier/releases/download/v$($env:VERSION)/$asset"
          $manifest = [ordered]@{
            version   = $env:VERSION
            notes     = "See the release notes at https://github.com/feelgoodrp-com/atelier/releases/tag/v$($env:VERSION)"
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path "latest.json" -Encoding utf8
          Write-Host "Wrote latest.json -> $url"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: atelier v${{ env.VERSION }}
          # Prepended to the auto-generated notes. Migration banner for anyone
          # still on a pre-updater build (< 1.2.3).
          body: |
            > ⚠️ **Updating from a version before 1.2.3?** Older builds don't have
            > the auto-updater, so you need to download and install this version
            > **manually once** — use the `*-setup.exe` below. After that, atelier
            > updates itself automatically (Settings → General → Updates).
            > The portable ZIP does not auto-update.
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            atelier-${{ env.VERSION }}-portable.zip
            latest.json
